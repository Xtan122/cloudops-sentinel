name: CloudOps Sentinel CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - develop
      - main

permissions:
  id-token: write   # Allow Github Actions to request OIDC tokens for assume AWS IAM Role
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
            pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            --timeout=60

  security-scan:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Checkov
        run: pip install checkov

      - name: Run Terraform security scan
        run: checkov -d terraform --framework terraform

  deploy-dev:
    needs:
      - test
      - security-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
            role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
            aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform deploy dev
        working-directory: terraform/environments/dev
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
            ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
            STATE_BUCKET="cloudops-sentinel-tfstate-${ACCOUNT_ID}-dev"

            cat > backend-dev.hcl <<EOF
            bucket       = "${STATE_BUCKET}"
            key          = "cloudops-sentinel/dev/terraform.tfstate"
            region       = "${{ vars.AWS_REGION }}"
            encrypt      = true
            use_lockfile = true
            EOF

            cat > dev.tfvars <<EOF
            prefix                  = "cloudops-sentinel-dev"
            environment             = "dev"
            lambda_zip_path         = "../../../build/cloudops-sentinel-lambda-v6.zip"
            dry_run_mode            = true
            reserved_concurrency    = null
            slack_webhook_ssm_param = "/cloudops-sentinel/dev/slack/webhook-url"
            EOF

            aws ssm put-parameter \
              --region "${{ vars.AWS_REGION }}" \
              --name "/cloudops-sentinel/dev/slack/webhook-url" \
              --type SecureString \
              --value "$SLACK_WEBHOOK_URL" \
              --overwrite

            cd ../../..
            rm -rf build/lambda_package_v6 build/cloudops-sentinel-lambda-v6.zip
            mkdir -p build/lambda_package_v6
            python -m pip install \
              --platform manylinux2014_x86_64 \
              --implementation cp \
              --python-version 3.11 \
              --only-binary=:all: \
              --target build/lambda_package_v6 \
              jsonschema urllib3
            cp src/lambda/event_processor/handler.py build/lambda_package_v6/handler.py
            cp -R src/lambda/shared build/lambda_package_v6/shared
            cp -R src/lambda/compliance_engine build/lambda_package_v6/compliance_engine
            cp -R src/lambda/remediation_engine build/lambda_package_v6/remediation_engine
            cp -R config build/lambda_package_v6/config
            cd build/lambda_package_v6
            zip -r ../cloudops-sentinel-lambda-v6.zip .
            cd ../../terraform/environments/dev

            terraform init -backend-config=backend-dev.hcl
            terraform fmt -check -recursive
            terraform validate
            terraform plan -var-file=dev.tfvars -out=tfplan
            terraform apply -auto-approve tfplan

      - name: Notify Slack success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
            curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Deploy to development environment successful!"}' \
            $SLACK_WEBHOOK_URL

  deploy-production:
    needs:
      - test
      - security-scan
    runs-on: ubuntu-latest
    # TODO: Enable after terraform/environments/prod and production backend/tfvars are created.
    if: false && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
            role-to-assume: ${{ secrets.PROD_AWS_ROLE_ARN }}
            aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan production
        working-directory: terraform/environments/prod
        run: |
            terraform init -backend-config=backend-production.hcl
            terraform fmt -check -recursive
            terraform validate
            terraform plan -var-file=production.tfvars -out=tfplan

      - name: Terraform apply production
        working-directory: terraform/environments/prod
        run: terraform apply -auto-approve tfplan

      - name: Notify Slack success
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
            curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"Deploy to production environment successful!"}' \
            $SLACK_WEBHOOK_URL

  notify-failure:
    needs:
      - test
      - security-scan
      - deploy-dev
      # TODO: Add deploy-production after production environment is enabled.
      # - deploy-production
    if: always() && failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
            curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 CI/CD Pipeline Failed! Please check the GitHub Actions logs."}' \
            $SLACK_WEBHOOK_URL
